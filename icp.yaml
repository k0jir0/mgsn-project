canisters:
  - name: backend
    build:
      steps:
        - type: script
          commands:
            - cp backend/backend.wasm "$ICP_WASM_OUTPUT_PATH"

  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: dist
        build:
          - npm install
          - npm run build
